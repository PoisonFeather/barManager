version: '3.8'
services:
  db:
    image: postgres:15
    container_name: bars_database
    restart: always
    environment:
      POSTGRES_USER: admin_boss
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: bars_management
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: